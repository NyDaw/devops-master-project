name: Sirius-Orange CI/CD Pipeline

# 1. Trăgaciul: Când pornește robotul?
on:
  push:
    branches:
      - main # Pornește la orice modificare pe ramura principală

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Serverul gratuit de la GitHub (Muncitorul)

    steps:
    - name: 1. Descărcăm codul tău de pe GitHub
      uses: actions/checkout@v3

    - name: 2. Autentificare la seiful Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Construim și urcăm imaginea Docker pe net
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sirius-api:latest

    - name: 4. Copiem fișierul Kubernetes pe serverul AWS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "k8s/deployment.yaml"
        target: "/home/ubuntu/"

    - name: 5. Dirijorul preia controlul (Aplicăm pe Kubernetes)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Îi dăm biletul lui Kubernetes
          sudo k3s kubectl apply -f /home/ubuntu/k8s/deployment.yaml
          # Forțăm repornirea containerelor ca să tragă noua ta imagine
          sudo k3s kubectl rollout restart deployment/sirius-app-deployment