name: Sirius-Orange CI/CD Pipeline

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 🟢 Aici am redus la tăcere avertismentul!

    steps:
    - name: 1. Descărcăm codul tău de pe GitHub
      uses: actions/checkout@v4

    - name: 2. Autentificare la seiful Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Construim și urcăm imaginea Docker pe net
      uses: docker/build-push-action@v5
      with:
        context: ./app
        file: ./app/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sirius-api:latest

    - name: 4. Copiem fișierul Kubernetes pe serverul AWS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "k8s/deployment.yaml"
        target: "/home/ubuntu/"

    - name: 5. Dirijorul preia controlul (Aplicăm pe Kubernetes)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Așteptăm până când K3s este gata să primească comenzi
          echo "Așteptăm ca serverul să fie gata..."
          timeout 60s bash -c 'until sudo k3s kubectl get nodes; do sleep 5; done'
          
          # Aplicăm fișierul YAML
          sudo k3s kubectl apply -f /home/ubuntu/k8s/deployment.yaml
          
          # Restartăm containerele pentru a trage ultima imagine
          sudo k3s kubectl rollout restart deployment/sirius-app-deployment