---
- name: Instalare Kubernetes (K3s) pe noul server AWS
  hosts: k3s_cluster
  become: yes # Asta înseamnă că va rula comenzile cu drepturi de Administrator (sudo)

  tasks:
    - name: Pasul 1 - Descarcam si instalam K3s automat
      shell: curl -sfL https://get.k3s.io | sh -
      
    - name: Pasul 2 - Ne asiguram ca K3s este pornit si ruleaza
      systemd:
        name: k3s
        state: started
        enabled: yes