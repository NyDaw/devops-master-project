apiVersion: apps/v1
kind: Deployment
metadata:
  name: sirius-app-deployment
spec:
  replicas: 2 # Vrem ca Dirijorul să țină mereu 2 containere pornite (pentru redundanță)
  selector:
    matchLabels:
      app: sirius-app
  template:
    metadata:
      labels:
        app: sirius-app
    spec:
      containers:
      - name: sirius-app
        # AICI MODIFICI:
        image: nydaw/sirius-api:latest
        ports:
        - containerPort: 5000
---
# Acesta este "Polițistul din intersecție" (Service) care preia traficul de pe net (port 80)
# și îl trimite către cele 2 containere ale noastre pe portul 5000
apiVersion: v1
kind: Service
metadata:
  name: sirius-app-service
spec:
  type: NodePort
  selector:
    app: sirius-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080